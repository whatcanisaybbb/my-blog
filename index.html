<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的博客</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="navbar">
  <a href="./" class="logo">我的<span>博客</span></a>
  <nav>
    <a href="./" class="active">首页</a>
    <a href="admin.html">管理</a>
  </nav>
</header>

<main class="container">
  <section class="hero">
    <h1>你好，欢迎来到我的博客</h1>
    <p>记录学习、生活和想法的地方</p>
  </section>

  <section class="post-list" id="postList">
    <div class="loading"></div>
  </section>
</main>

<footer class="footer">
  <p>© 2026 我的博客</p>
</footer>

<script src="js/github-store.js"></script>
<script>
  GitHubStore.getPosts()
    .then(posts => {
      const el = document.getElementById('postList');
      if (posts.length === 0) {
        el.innerHTML = `<div class="empty"><div class="icon">📝</div><p>还没有文章，去<a href="admin.html">管理后台</a>写一篇吧！</p></div>`;
        return;
      }
      el.innerHTML = posts.map(post => `
        <a href="post.html?id=${post.id}" class="post-card">
          <h2 class="post-title">${esc(post.title)}</h2>
          <p class="post-excerpt">${esc(stripMd(post.content).slice(0, 120))}...</p>
          <div class="post-meta">
            <span>📅 ${fmtDate(post.date)}</span>
            <div class="post-tags">
              ${(post.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('')}
            </div>
          </div>
        </a>
      `).join('');
    })
    .catch(e => {
      document.getElementById('postList').innerHTML = `<div class="empty"><p>加载失败</p></div>`;
    });

  function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
  function stripMd(s) { return (s || '').replace(/[#*`~\[\]()>|-]/g, '').replace(/\n/g, ' '); }
  function fmtDate(d) { const dt = new Date(d); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; }
</script>

</body>
</html>
